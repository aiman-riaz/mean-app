version: "3.8"
services:
  mongo:
    image: mongo:6.0
    volumes:
      - mongo_data:/data/db
  backend:
    image: YOUR_DOCKERHUB_USERNAME/mean-backend:latest
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/meandb
  frontend:
    image: YOUR_DOCKERHUB_USERNAME/mean-frontend:latest
    depends_on:
      - backend
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
volumes:
  mongo_data: